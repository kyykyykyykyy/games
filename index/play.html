<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>봉봉이 장난감 구하기!</title>
    <style>
        body { font-family: 'Malgun Gothic', 'Segoe UI Emoji', sans-serif; margin: 0; height: 100vh; background: linear-gradient(135deg, #fff3e0, #ffe0b2); display: flex; align-items: center; justify-content: center; overscroll-behavior-y: contain; touch-action: none; user-select: none; }
        .game-container { width: 100%; max-width: 480px; box-sizing: border-box; background: rgba(255, 255, 255, 0.95); border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); border: 4px solid #ffb74d; text-align: center; overflow: hidden; margin: 10px; display: flex; flex-direction: column; position: relative; }
        .header { background: #ffb74d; padding: 15px; margin: 0; color: #5d4037; display: flex; justify-content: space-between; align-items: center;}
        .header h2 { margin: 0; font-size: 18px; letter-spacing: -0.5px; } 
        .stats { display: flex; gap: 5px; }
        .health-bar { font-size: 14px; font-weight: bold; background: #fff; padding: 5px 8px; border-radius: 10px; color: #d32f2f; }
        .stress-bar { font-size: 14px; font-weight: bold; background: #fff; padding: 5px 8px; border-radius: 10px; color: #6c5ce7; }
        
        #top-ui { display: flex; justify-content: space-around; align-items: center; background: #fff8e1; padding: 10px; border-bottom: 2px dashed #ffcc80; }
        .stat-box { font-size: 15px; font-weight: bold; color: #e65100; }
        
        #game-board-container { width: 100%; position: relative; padding: 10px; box-sizing: border-box; }
        canvas { background: #fffde7; border: 3px solid #ffb74d; border-radius: 10px; display: block; width: 100%; max-width: 400px; aspect-ratio: 3 / 4; box-shadow: inset 0 0 15px rgba(0,0,0,0.05); margin: 0 auto; touch-action: none; cursor: crosshair;}
        
        .btn-home { background: #757575; color: white; border: none; padding: 12px; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: auto;}
        
        #selection-screen { padding: 30px 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #selection-screen h3 { color: #e65100; font-size: 20px; margin-bottom: 10px; }
        .guide-text { font-size: 13px; color: #d84315; margin-bottom: 15px; font-weight: bold; background: #ffecb3; padding: 10px; border-radius: 10px; text-align: left; line-height: 1.5; }
        #toy-list { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .toy-btn { width: 90%; padding: 15px; margin: 8px 0; font-size: 16px; font-weight: bold; color: #333; border: 3px solid #ccc; border-radius: 15px; background: #fff; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .toy-btn:hover:not(.disabled) { transform: scale(1.05); }
        .toy-btn.disabled { opacity: 0.4; background: #eee; cursor: not-allowed; text-decoration: line-through; border-color: #aaa;}
    </style>
</head>
<body onload="renderToySelection()">

<div class="game-container">
    <div class="header">
        <h2>🎾 장난감 구하기!</h2>
        <div class="stats">
            <div class="stress-bar">⚡ 스트레스: <span id="stress-text">50</span></div>
            <div class="health-bar">❤️ 건강: <span id="hp-text">50</span></div>
        </div>
    </div>

    <div id="selection-screen">
        <h3>🎁 오늘 구할 장난감을 고르세요!</h3>
        <div class="guide-text">
            🎮 <b>장난감 합치기 룰!</b><br>
            드래그하여 조준하고 <b>손을 떼면</b> 떨어집니다!<br>
            (개껌 ➡️ 야구공 ➡️ 농구공 ➡️ 배구공 ➡️ 축구공 ➡️ 원반 ➡️ 곰인형 ➡️ <b>목표!</b>)<br>
            (※ 상자 밖으로 넘치면 실패 🚨)
        </div>
        <div id="toy-list"></div>
        <button class="btn-home" style="margin-top: 20px;" onclick="goHome()">🏠 돌아가기</button>
    </div>

    <div id="game-ui" style="display: none; flex-direction: column; height: 100%;">
        <div id="top-ui">
            <div class="stat-box" id="toyUI">목표: ?</div>
            <div class="stat-box" id="scoreUI">점수: 0</div>
            <div class="stat-box" id="nextUI">다음: ?</div>
        </div>
        
        <div id="game-board-container">
            <canvas id="gameCanvas" width="300" height="400"></canvas>
        </div>
        
        <button class="btn-home" onclick="goHome()">🏠 놀이 포기하고 집에 가기</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<script>
    const today = new Date().toISOString().split('T')[0];
    let bongbongData = JSON.parse(localStorage.getItem('bongbongData')) || { stress: 50, health: 50, collectedToys: [], toyLastPlayed: "" };
    if (!bongbongData.collectedToys) bongbongData.collectedToys = []; 

    if (bongbongData.toyLastPlayed === today) {
        alert("오늘은 이미 장난감을 구했어요! 내일 다시 오세요!");
        window.location.href = 'index.html';
    }

    document.getElementById('stress-text').innerText = bongbongData.stress !== undefined ? bongbongData.stress : 50;
    document.getElementById('hp-text').innerText = bongbongData.health;
    
    const EVOLUTION_STAGES = [
        { level: 0, emoji: "🦴", size: 15, name: "개껌", color: "#efebe9" },
        { level: 1, emoji: "⚾", size: 22, name: "야구공", color: "#ffffff" },
        { level: 2, emoji: "🏀", size: 28, name: "농구공", color: "#ffcc80" },
        { level: 3, emoji: "🏐", size: 35, name: "배구공", color: "#fff9c4" },
        { level: 4, emoji: "⚽", size: 42, name: "축구공", color: "#eeeeee" },
        { level: 5, emoji: "🥏", size: 50, name: "원반", color: "#b3e5fc" },
        { level: 6, emoji: "🧸", size: 60, name: "곰인형", color: "#dcedc8" },
    ];

    const TOYS = [
        { id: 0, name: "핑크빛 딸기 상자", color: "#ffadad", emoji: "🍓", finalSize: 80 },
        { id: 1, name: "노란빛 치즈 상자", color: "#fdffb6", emoji: "🧀", finalSize: 80 },
        { id: 2, name: "초록빛 메론 상자", color: "#caffbf", emoji: "🍈", finalSize: 80 },
        { id: 3, name: "하늘빛 소다 상자", color: "#9bf6ff", emoji: "🥤", finalSize: 80 },
        { id: 4, name: "보라빛 포도 상자", color: "#bdb2ff", emoji: "🍇", finalSize: 80 }
    ];

    let currentToy = null;

    function renderToySelection() {
        const listDiv = document.getElementById('toy-list');
        listDiv.innerHTML = '';
        TOYS.forEach(toy => {
            const isCollected = bongbongData.collectedToys.includes(toy.id);
            const btn = document.createElement('button');
            btn.className = `toy-btn ${isCollected ? 'disabled' : ''}`;
            btn.style.borderColor = toy.color;
            btn.innerHTML = `${toy.emoji} ${toy.name} ${isCollected ? '(보유중)' : ''}`;
            if (!isCollected) btn.onclick = () => startToyGame(toy);
            listDiv.appendChild(btn);
        });
    }

    function goHome() { window.location.href = 'index.html'; }

    let engine, render, runner, world;
    let score = 0;
    let nextItemLevel = 0;
    let isDropping = false;
    let gameActive = true;
    let bodiesMap = {}; 
    let canvas, ctx;

    let activeX = 150; 
    let isDragging = false;

    function startToyGame(selectedToy) {
        currentToy = selectedToy;
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'flex';
        document.getElementById('toyUI').innerText = `목표: ${currentToy.emoji}`;
        
        EVOLUTION_STAGES[7] = { level: 7, emoji: currentToy.emoji, size: currentToy.finalSize, name: currentToy.name, color: currentToy.color };
        
        initPhysics();
    }

    function getNextItem() {
        return Math.floor(Math.random() * 3); 
    }

    function initPhysics() {
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');
        const width = 300;
        const height = 400;
        activeX = width / 2; 

        engine = Matter.Engine.create();
        world = engine.world;
        
        // 🚨 이전에 있던 Matter.Events.on(engine, 'afterUpdate', drawGame) 코드를 삭제했습니다! (과부하의 원인)

        const wallOptions = { isStatic: true, render: { visible: false }, friction: 0 };
        Matter.World.add(world, [
            Matter.Bodies.rectangle(width / 2, height + 25, width, 50, wallOptions), 
            Matter.Bodies.rectangle(-25, height / 2, 50, height * 2, wallOptions), 
            Matter.Bodies.rectangle(width + 25, height / 2, 50, height * 2, wallOptions) 
        ]);

        Matter.Events.on(engine, 'collisionStart', function(event) {
            if(!gameActive) return;
            const pairs = event.pairs;
            
            for (let i = 0; i < pairs.length; i++) {
                const bodyA = pairs[i].bodyA;
                const bodyB = pairs[i].bodyB;

                const dataA = bodiesMap[bodyA.id];
                const dataB = bodiesMap[bodyB.id];

                if (dataA && dataB && dataA.level === dataB.level && dataA.level < 7 && !dataA.merging && !dataB.merging) {
                    dataA.merging = true;
                    dataB.merging = true;

                    score += (dataA.level + 1) * 10;
                    document.getElementById('scoreUI').innerText = `점수: ${score}`;

                    Matter.World.remove(world, bodyA);
                    Matter.World.remove(world, bodyB);
                    delete bodiesMap[bodyA.id];
                    delete bodiesMap[bodyB.id];

                    const nextLevel = dataA.level + 1;
                    const newX = (bodyA.position.x + bodyB.position.x) / 2;
                    const newY = (bodyA.position.y + bodyB.position.y) / 2;
                    
                    createNewBody(newX, newY, nextLevel, false);

                    if (nextLevel === 7) {
                        gameActive = false;
                        handleVictory();
                    }
                }
            }
        });

        // 물리 엔진 자체 업데이트루프
        runner = Matter.Runner.create();
        Matter.Runner.run(runner, engine);

        // 게임 오버 체크를 별도의 루프로 분리하여 최적화
        setInterval(() => {
            if(!gameActive) return;
            const bodies = Matter.Composite.allBodies(world);
            for (let i = 0; i < bodies.length; i++) {
                const b = bodies[i];
                if (!b.isStatic && Math.abs(b.velocity.y) < 0.2 && Math.abs(b.velocity.x) < 0.2) { 
                    if (b.position.y < 50 && bodiesMap[b.id] && !bodiesMap[b.id].isCurrent) { 
                        gameActive = false;
                        handleDefeat();
                        break;
                    }
                }
            }
        }, 500);

        nextItemLevel = getNextItem();
        updateNextUI();

        canvas.addEventListener('pointerdown', handlePointerDown);
        canvas.addEventListener('pointermove', handlePointerMove);
        canvas.addEventListener('pointerup', handlePointerUp);
        
        // 정상적인 렌더링 시작
        requestAnimationFrame(drawGame);
    }

    function updateNextUI() {
        const nextData = EVOLUTION_STAGES[nextItemLevel];
        document.getElementById('nextUI').innerText = `다음: ${nextData.emoji}`;
    }

    function createNewBody(x, y, level, isCurrent) {
        const stageData = EVOLUTION_STAGES[level];
        const body = Matter.Bodies.circle(x, y, stageData.size, {
            restitution: 0.6, 
            friction: 0.1,    
            density: 0.05,
            isStatic: isCurrent 
        });
        
        bodiesMap[body.id] = {
            level: level,
            emoji: stageData.emoji,
            size: stageData.size,
            color: stageData.color,
            isCurrent: isCurrent,
            merging: false
        };
        
        Matter.World.add(world, body);
        return body;
    }

    function updateActiveX(e) {
        const rect = canvas.getBoundingClientRect();
        let x = e.clientX;
        if (e.touches && e.touches.length > 0) x = e.touches[0].clientX;
        
        if (x !== undefined) {
            x = x - rect.left;
            const stageData = EVOLUTION_STAGES[nextItemLevel];
            activeX = Math.max(stageData.size + 10, Math.min(x, canvas.width - stageData.size - 10));
        }
    }

    function handlePointerDown(e) {
        if (!gameActive || isDropping) return;
        isDragging = true;
        updateActiveX(e);
    }

    function handlePointerMove(e) {
        if (!gameActive || isDropping || !isDragging) return;
        updateActiveX(e);
    }

    function handlePointerUp(e) {
        if (!gameActive || isDropping || !isDragging) return;
        isDragging = false;
        updateActiveX(e);
        dropItem();
    }

    function dropItem() {
        isDropping = true;
        createNewBody(activeX, 30, nextItemLevel, false);
        
        setTimeout(() => {
            if(gameActive) {
                nextItemLevel = getNextItem();
                updateNextUI();
                isDropping = false;
            }
        }, 1000);
    }

    function drawGame() {
        if (!gameActive) return; // 게임이 끝나면 더 이상 화면을 그리지 않음 (최적화)

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.beginPath();
        ctx.moveTo(0, 50);
        ctx.lineTo(canvas.width, 50);
        ctx.strokeStyle = "rgba(255, 0, 0, 0.5)";
        ctx.setLineDash([5, 5]);
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.setLineDash([]);

        if (!isDropping && gameActive) {
            const stageData = EVOLUTION_STAGES[nextItemLevel];
            
            ctx.beginPath();
            ctx.arc(activeX, 30, stageData.size, 0, 2 * Math.PI);
            ctx.fillStyle = stageData.color + "80"; 
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(activeX, 30 + stageData.size);
            ctx.lineTo(activeX, canvas.height);
            ctx.strokeStyle = "rgba(0,0,0,0.15)";
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.save();
            ctx.translate(activeX, 30);
            ctx.font = `${stageData.size * 1.2}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.globalAlpha = 0.5;
            ctx.fillText(stageData.emoji, 0, 0);
            ctx.restore();
        }

        const bodies = Matter.Composite.allBodies(world);
        for (let i = 0; i < bodies.length; i++) {
            const body = bodies[i];
            const data = bodiesMap[body.id];
            
            if (data) {
                ctx.beginPath();
                ctx.arc(body.position.x, body.position.y, data.size, 0, 2 * Math.PI);
                ctx.fillStyle = data.color;
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "rgba(0,0,0,0.1)";
                ctx.stroke();

                ctx.save();
                ctx.translate(body.position.x, body.position.y);
                ctx.rotate(body.angle);
                ctx.font = `${data.size * 1.2}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(data.emoji, 0, 0);
                ctx.restore();
            }
        }
        
        requestAnimationFrame(drawGame);
    }

    function handleVictory() {
        setTimeout(() => {
            const toyQuotes = [
                `"훗, 이 ${currentToy.name}? 꽤 크게 잘 만들었네. 보물창고에 넣어둬."`,
                "\"닝겐, 머리 좀 썼는데? 곰인형 합치는 솜씨가 제법이구나 멍!\"",
                "\"오호... 이 정도 크기면 내 맘에 쏙 든다. 특별히 칭찬해주마.\""
            ];
            const randomQuote = toyQuotes[Math.floor(Math.random() * toyQuotes.length)];

            bongbongData.collectedToys.push(currentToy.id);
            bongbongData.toyLastPlayed = today; 
            
            let newMaxStress = 100 - (bongbongData.collectedToys.length * 10);
            bongbongData.stress -= 25; 
            if(bongbongData.stress < 0) bongbongData.stress = 0;
            if(bongbongData.stress > newMaxStress) bongbongData.stress = newMaxStress;

            localStorage.setItem('bongbongData', JSON.stringify(bongbongData));

            alert(`🎉 장난감 완성!\n\n봉봉이: ${randomQuote}\n\n최대 스트레스 한도가 ${newMaxStress}으로 줄어듭니다!`);
            window.location.href = 'index.html';
        }, 500);
    }

    function handleDefeat() {
        setTimeout(() => {
            const failToyQuotes = [
                "\"장난감이 밖으로 다 튀어나오잖아! 진짜 밥값 못하는 닝겐이네.\"",
                "\"장난감 하나 못 만들어서 쌓기만 해? 저리 비켜라, 내가 하리?\"",
                "\"어휴, 저 한심한 손가락 좀 봐. 내일은 좀 제대로 해봐라 멍!\""
            ];
            const randomToyFailQuote = failToyQuotes[Math.floor(Math.random() * failToyQuotes.length)];
            alert(`🚨 상자가 넘쳤습니다!\n\n봉봉이: ${randomToyFailQuote}\n\n(스트레스 +10 🚨)`);
            
            bongbongData.stress += 10;
            let maxStress = 100 - (bongbongData.collectedToys.length * 10);
            if(bongbongData.stress > maxStress) bongbongData.stress = maxStress;
            bongbongData.toyLastPlayed = today; 

            localStorage.setItem('bongbongData', JSON.stringify(bongbongData));
            window.location.href = 'index.html'; 
        }, 500);
    }
</script>
</body>
</html>
