<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>포코피아 건축 에디터 v2.8 (도면 선로 디자인 전면 개편)</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 10px; }
        .info-text { text-align: center; color: #d32f2f; font-weight: bold; font-size: 14px; margin-bottom: 20px; background: #ffebee; padding: 8px; border-radius: 8px; display: inline-block; }
        .header-container { text-align: center; }
        
        .container { display: flex; gap: 20px; justify-content: center; height: 750px; }
        
        /* 왼쪽 패널: 팔레트 */
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow-y: auto; }
        .palette { width: 180px; }
        .mat-section-title { font-weight: bold; margin: 15px 0 8px; color: #555; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        
        .mat-btn { display: flex; align-items: center; gap: 8px; padding: 8px; margin-bottom: 6px; border: 2px solid transparent; border-radius: 8px; cursor: pointer; background: #f9f9f9; transition: 0.2s; font-size: 13px; font-weight: bold; }
        .mat-btn:hover { background: #eee; }
        .mat-btn.active { border-color: #333; background: #e0e0e0; }
        .color-box { width: 20px; height: 20px; border-radius: 4px; border: 1px solid #ccc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; }

        .color-picker-group { display: flex; gap: 10px; margin-bottom: 10px; padding: 5px 0; }
        .color-circle { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s; }
        .color-circle:hover { transform: scale(1.1); }
        .color-circle.active { border-color: #333; transform: scale(1.1); }

        /* 중앙 패널: 2D 그리드 */
        .grid-container { flex: 1; min-width: 650px; display: flex; flex-direction: column; align-items: center; }
        .top-controls { display: flex; gap: 10px; width: 100%; justify-content: space-between; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
        
        .tool-group { display: flex; gap: 5px; background: #eee; padding: 5px; border-radius: 8px; align-items: center; }
        .tool-btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; background: transparent; font-weight: bold; transition: 0.2s; font-size: 13px; }
        .tool-btn.active { background: #ff9800; color: white; }
        #btn-rotate { background: #673AB7; color: white; margin-left: 5px; }
        #btn-rotate:hover { background: #5E35B1; }
        
        .size-select { padding: 6px 10px; border-radius: 6px; border: 1px solid #ccc; font-weight: bold; font-size: 13px; cursor: pointer; }

        .file-controls { display: flex; gap: 5px; }
        .file-btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; background: #009688; color: white; font-weight: bold; font-size: 13px; transition: 0.2s; }
        .file-btn:hover { background: #00796b; }

        .history-controls { display: flex; gap: 5px; }
        .history-btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; background: #757575; color: white; font-weight: bold; font-size: 13px; transition: 0.2s; }
        .history-btn:hover:not(:disabled) { background: #616161; }
        .history-btn:disabled { background: #ccc; cursor: not-allowed; opacity: 0.7; }

        .layer-controls { display: flex; gap: 10px; align-items: center; }
        button { padding: 8px 16px; cursor: pointer; border: none; border-radius: 6px; background: #4caf50; color: white; font-weight: bold; font-size: 14px; }
        button:hover:not(:disabled) { background: #45a049; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .layer-info { font-size: 16px; font-weight: bold; width: 50px; text-align: center; }
        .toggle-btn { background: #2196F3; font-size: 13px; padding: 8px 12px;}
        
        .grid-wrapper { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; overflow: auto; }
        .grid { display: grid; background: #fff; border: 3px solid #333; padding: 0; user-select: none; width: max-content; }
        .cell { width: 24px; height: 24px; background: white; cursor: pointer; position: relative; box-sizing: border-box; border-right: 1px solid #eee; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }
        
        .cell:hover::before { content: attr(data-preview); position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; color: rgba(0,0,0,0.6); font-size: 14px; pointer-events: none; z-index: 10; }
        .cell:hover::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.1); z-index: 5; pointer-events: none;}
        
        .col-5 { border-right: 2px solid #555 !important; }
        .row-5 { border-bottom: 2px solid #555 !important; }
        .onion-skin { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.3; pointer-events: none; }
        .preview-rect { border: 2px dashed #333 !important; opacity: 0.7; z-index: 10; background: rgba(0,0,0,0.1) !important; }

        /* 🚂 [핵심 업데이트] 도면용 기찻길 비주얼 스타일 개편! 🚂 */
        
        /* 1. 모든 선로 블록 공통: 자갈밭 배경, 글씨 투명(기호 안보이게) */
        [class*="mat-60"] {
            background-color: #f0f0f0 !important; /* 연회색 자갈밭 배경 */
            position: relative;
            color: transparent !important; /* 기존 특수기호 텍스트를 숨겨 디자인 공간 확보 */
        }
        
        /* 팔레트 내 기호는 보이게 처리 */
        .mat-btn [class*="mat-60"] { color: transparent !important; }

        /* 2. 침목(나무 받침대) 공통 스타일 */
        [class*="mat-60"]::after { content: ''; position: absolute; background-color: #8B4513; border-radius: 1px; }

        /* 3. 금속 선로(레일) 공통 스타일 */
        [class*="mat-60"]::before { content: ''; position: absolute; z-index: 2; background-color: #757575; }

        /* --- 3-1. 직선 및 경사 선로 패턴 --- */
        
        /* 가로 방향 직선 레일 (═, 🎢→, 🎢←): IDs 601, 608, 610 */
        .mat-601, .mat-608, .mat-610 {
            /* 세로 침목 패턴 */
            background-image: repeating-linear-gradient(90deg, transparent 0px, transparent 4px, #8B4513 4px, #8B4513 8px, transparent 8px, transparent 12px) !important;
            background-size: 12px 100% !important;
        }
        /* 가로 레일 철쇠선 */
        .mat-601::before, .mat-608::before, .mat-610::before {
            height: 2.5px; width: 100%; top: 6px; left: 0; /* 위쪽 레일 */
            box-shadow: 0 9.5px 0 #757575; /* 아래쪽 레일 (그림자로 한줄 더 생성) */
        }

        /* 세로 방향 직선 레일 (║, 🎢↑, 🎢↓): IDs 602, 607, 609 */
        .mat-602, .mat-607, .mat-609 {
            /* 가로 침목 패턴 */
            background-image: repeating-linear-gradient(0deg, transparent 0px, transparent 4px, #8B4513 4px, #8B4513 8px, transparent 8px, transparent 12px) !important;
            background-size: 100% 12px !important;
        }
        /* 세로 레일 철쇠선 */
        .mat-602::before, .mat-607::before, .mat-609::before {
            width: 2.5px; height: 100%; left: 6px; top: 0; /* 왼쪽 레일 */
            box-shadow: 9.5px 0 0 #757575; /* 오른쪽 레일 */
        }

        /* 경사로(🎢) 힌트 표시: 코너 침목 안쓰는 before, after 활용 */
        .mat-607::after, .mat-608::after, .mat-609::after, .mat-610::after {
            content: '⛰️'; font-size: 12px; position: absolute; opacity: 0.5; color: black !important; z-index: 5;
        }
        .mat-607::after { top: -2px; left: -2px; } /* 북 */
        .mat-608::after { top: -2px; right: -2px; } /* 동 */
        .mat-609::after { bottom: -2px; right: -2px; } /* 남 */
        .mat-610::after { bottom: -2px; left: -2px; } /* 서 */


        /* --- 3-2. 코너 선로 패턴 --- */
        
        /* 코너 침목 공통: 크기 키움 */
        .mat-603::after, .mat-604::after, .mat-605::after, .mat-606::after { background-color: #8B4513; width: 12px; height: 12px; transform: rotate(45deg); z-index: 1; }
        
        /* 코너 레일 공통: 테두리와 라운딩 활용 */
        .mat-603::before, .mat-604::before, .mat-605::before, .mat-606::before { border: 2.5px solid #757575; background: none !important; width: 14px; height: 14px; }

        /* mat-603 (╚): 남->동 코너. Arc Bottom-Left */
        .mat-603::before { top: -2.5px; right: -2.5px; border-bottom-left-radius: 12px; border-top: none; border-right: none; }
        .mat-603::after { bottom: 1px; left: 1px; }

        /* mat-604 (╔): 북->동 코너. Arc Top-Left */
        .mat-604::before { bottom: -2.5px; right: -2.5px; border-top-left-radius: 12px; border-bottom: none; border-right: none; }
        .mat-604::after { top: 1px; left: 1px; }

        /* mat-605 (╗): 북->서 코너. Arc Top-Right */
        .mat-605::before { bottom: -2.5px; left: -2.5px; border-top-right-radius: 12px; border-bottom: none; border-left: none; }
        .mat-605::after { top: 1px; right: 1px; }

        /* mat-606 (╝): 남->서 코너. Arc Bottom-Right */
        .mat-606::before { top: -2.5px; left: -2.5px; border-bottom-right-radius: 12px; border-top: none; border-left: none; }
        .mat-606::after { bottom: 1px; right: 1px; }


        /* 오른쪽 패널: 3D 프리뷰 */
        .preview-container { width: 550px; display: flex; flex-direction: column; }
        #canvas3d { flex: 1; background: #eef2f5; border-radius: 8px; border: 2px solid #ccc; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .preview-title { text-align: center; font-weight: bold; margin-bottom: 10px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div class="header-container">
        <div class="header">
            <h1>🧱 포코피아 건축 에디터 v2.8 (선로 디자인 개편)</h1>
            <p>R키로 지붕, 창호, 선로를 회전시키세요. <b>이제 도면에서 기찻길이 헷갈리지 않습니다!</b></p>
        </div>
        <div class="info-text">💡 팁: 도면에서 <b>나무 침목과 금속 선로</b>가 뚜렷하게 보이는 블록이 기찻길입니다. 자갈밭 배경을 확인하세요.</div>
    </div>

    <div class="container">
        <div class="panel palette" id="palette"></div>

        <div class="panel grid-container">
            <div class="top-controls">
                <div class="tool-group">
                    <select id="size-select" class="size-select" onchange="changeCanvasSize(this.value)">
                        <option value="10">10x10</option>
                        <option value="15">15x15</option>
                        <option value="20">20x20</option>
                        <option value="25" selected>25x25</option>
                        <option value="30">30x30</option>
                        <option value="40">40x40</option>
                    </select>
                    <button class="tool-btn active" id="btn-pen">🖌️ 펜</button>
                    <button class="tool-btn" id="btn-rect">🔲 사각형</button>
                    <button class="tool-btn" id="btn-rotate" title="단축키: R" onclick="rotateCurrentMaterial()">↻ 회전</button>
                </div>
                
                <div class="file-controls">
                    <button class="file-btn" onclick="saveBlueprint()">💾 저장</button>
                    <button class="file-btn" onclick="document.getElementById('file-upload').click()">📂 불러오기</button>
                    <input type="file" id="file-upload" accept=".json" style="display: none;" onchange="loadBlueprint(event)">
                    <button class="file-btn" style="background:#E91E63;" onclick="capture3D()">📸 캡처</button>
                </div>

                <div class="history-controls">
                    <button class="history-btn" id="btn-undo" onclick="undo()" title="단축키: Ctrl+Z" disabled>↩ 이전</button>
                    <button class="history-btn" id="btn-redo" onclick="redo()" title="단축키: Ctrl+Y" disabled>↪ 다음</button>
                </div>

                <div class="layer-controls">
                    <button id="btn-down">▼</button>
                    <div class="layer-info" id="layer-text">1 단</div>
                    <button id="btn-up">▲</button>
                </div>
                <button class="toggle-btn" id="btn-onion">비치기 ON</button>
            </div>
            <div class="grid-wrapper">
                <div class="grid" id="grid"></div>
            </div>
        </div>

        <div class="panel preview-container">
            <div class="preview-title">🎮 3D 실시간 프리뷰</div>
            <div id="canvas3d"><span style="color:#888;">로딩 중...</span></div>
        </div>
    </div>

    <script>
        // --- 1. 기본 설정 및 데이터 (let 사용) ---
        let SIZE = 25; 
        const LAYERS = 7; 
        let currentLayer = 0; 
        let selectedMat = 1; 
        let showOnionSkin = true;
        
        let currentTool = 'pen'; 
        let isMouseDown = false;
        let paintMode = 'paint'; 
        let stateChanged = false; 
        
        let rectStartX = -1, rectStartY = -1;
        let rectEndX = -1, rectEndY = -1;

        let currentRoofColor = 'orange'; 
        let currentSlopeDir = 1, currentCornerDir = 5; 
        let currentWindowDir = 1, currentDoorDir = 1; 
        
        // 기찻길 방향 추적 변수
        let currentTrackStraightDir = 1; 
        let currentTrackCornerDir = 3;   
        let currentTrackRampDir = 7;     

        const roofPrefix = { 'orange': 100, 'blue': 200, 'skyblue': 300 };
        let buildingData = [];

        function initBuildingData() {
            buildingData = Array.from({ length: LAYERS }, () => 
                Array.from({ length: SIZE }, () => Array(SIZE).fill(0))
            );
        }
        initBuildingData();

        window.changeCanvasSize = function(newSize) {
            if (confirm("캔버스 크기를 변경하면 현재 작업 중인 도면이 모두 초기화됩니다.\n계속하시겠습니까?")) {
                SIZE = parseInt(newSize);
                initBuildingData(); historyStack = []; historyIndex = -1; currentLayer = 0;
                saveHistory(); drawGrid();
                if (is3DReady) {
                    camera.position.set(SIZE * 1.2, SIZE * 0.8, SIZE * 1.2);
                    controls.target.set(SIZE / 2, 0, SIZE / 2); controls.update(); update3DSafe();
                }
            } else { document.getElementById('size-select').value = SIZE; }
        };

        // --- 파일 저장/불러오기 (JSON) ---
        window.saveBlueprint = function() {
            let fileName = prompt("저장할 파일 이름을 입력하세요:", "pokopia_blueprint");
            if (fileName === null) return; 
            fileName = fileName.trim() || "pokopia_blueprint";
            if (!fileName.endsWith('.json')) fileName += '.json';

            const exportData = { title: fileName.replace('.json', ''), version: "2.8", size: SIZE, layers: LAYERS, data: buildingData };
            const dataStr = JSON.stringify(exportData);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = fileName; a.click(); URL.revokeObjectURL(url); 
        };

        window.loadBlueprint = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.size && imported.size !== SIZE) {
                        SIZE = imported.size; document.getElementById('size-select').value = SIZE;
                        if (is3DReady) { camera.position.set(SIZE * 1.2, SIZE * 0.8, SIZE * 1.2); controls.target.set(SIZE / 2, 0, SIZE / 2); controls.update(); }
                    }
                    buildingData = imported.data; currentLayer = 0; historyStack = []; historyIndex = -1;
                    saveHistory(); drawGrid(); update3DSafe(); alert(`도면을 성공적으로 불러왔습니다! 🏗️`);
                } catch(err) { alert("잘못된 도면 파일입니다."); }
                event.target.value = ''; 
            };
            reader.readAsText(file);
        };

        // --- 히스토리 (Undo/Redo) ---
        let historyStack = [], historyIndex = -1; const MAX_HISTORY = 30; 
        function saveHistory() {
            const stateCopy = buildingData.map(layer => layer.map(row => [...row]));
            if (historyIndex < historyStack.length - 1) historyStack = historyStack.slice(0, historyIndex + 1);
            historyStack.push(stateCopy);
            if (historyStack.length > MAX_HISTORY) historyStack.shift(); else historyIndex++;
            updateHistoryUI();
        }
        function restoreState(state) {
            for (let l = 0; l < LAYERS; l++) for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) buildingData[l][y][x] = state[l][y][x];
            drawGrid(); update3DSafe(); updateHistoryUI();
        }
        window.undo = function() { if (historyIndex > 0) { historyIndex--; restoreState(historyStack[historyIndex]); } };
        window.redo = function() { if (historyIndex < historyStack.length - 1) { historyIndex++; restoreState(historyStack[historyIndex]); } };
        function updateHistoryUI() {
            document.getElementById('btn-undo').disabled = (historyIndex <= 0); document.getElementById('btn-redo').disabled = (historyIndex >= historyStack.length - 1);
        }
        
        // --- 4. 재료 데이터베이스 (JS Color는 3D용, 2D는 CSS로 구현) ---
        const materials = {
            0: { name: "지우개", color: "#ffffff", hex: 0xffffff, type: "basic" },
            1: { name: "목재 벽", color: "#8B4513", hex: 0x8B4513, type: "basic" },
            2: { name: "벽돌 벽", color: "#B22222", hex: 0xB22222, type: "basic" },
            3: { name: "콘크리트", color: "#A9A9A9", hex: 0xA9A9A9, type: "basic" },
            8: { name: "페인트 벽", color: "#D4D0C4", hex: 0xD4D0C4, type: "basic" },
            5: { name: "잔디", color: "#32CD32", hex: 0x32CD32, type: "basic" },
            6: { name: "수영장 물", color: "#1E90FF", hex: 0x1E90FF, transparent: true, opacity: 0.8, type: "basic" },
            7: { name: "기둥/나무", color: "#5C4033", hex: 0x5C4033, type: "basic" }
        };

        // 지붕 데이터 (101~308)
        const colors = [{ id: 100, name: "오렌지", color: "#FF9800", hex: 0xFF9800 }, { id: 200, name: "파랑", color: "#2196F3", hex: 0x2196F3 }, { id: 300, name: "하늘색", color: "#87CEEB", hex: 0x87CEEB }];
        colors.forEach(c => {
            materials[c.id + 1] = { name: "경사면", color: c.color, hex: c.hex, symbol: "↑", type: "roof_slope", rotY: Math.PI/2 };
            materials[c.id + 2] = { name: "경사면", color: c.color, hex: c.hex, symbol: "→", type: "roof_slope", rotY: 0 };
            materials[c.id + 3] = { name: "경사면", color: c.color, hex: c.hex, symbol: "↓", type: "roof_slope", rotY: -Math.PI/2 };
            materials[c.id + 4] = { name: "경사면", color: c.color, hex: c.hex, symbol: "←", type: "roof_slope", rotY: Math.PI };
            materials[c.id + 5] = { name: "모서리", color: c.color, hex: c.hex, symbol: "↗", type: "roof_corner", rotY: 0 };
            materials[c.id + 6] = { name: "모서리", color: c.color, hex: c.hex, symbol: "↘", type: "roof_corner", rotY: -Math.PI/2 };
            materials[c.id + 7] = { name: "모서리", color: c.color, hex: c.hex, symbol: "↙", type: "roof_corner", rotY: Math.PI };
            materials[c.id + 8] = { name: "모서리", color: c.color, hex: c.hex, symbol: "↖", type: "roof_corner", rotY: Math.PI/2 };
        });

        // 창문/문 (401~504)
        materials[401] = { name: "유리창", color: "#87CEFA", hex: 0x87CEFA, transparent: true, opacity: 0.6, symbol: "🪟↑", type: "thin_window", rotY: 0 };
        materials[402] = { name: "유리창", color: "#87CEFA", hex: 0x87CEFA, transparent: true, opacity: 0.6, symbol: "🪟→", type: "thin_window", rotY: Math.PI/2 };
        materials[403] = { name: "유리창", color: "#87CEFA", hex: 0x87CEFA, transparent: true, opacity: 0.6, symbol: "🪟↓", type: "thin_window", rotY: 0 };
        materials[404] = { name: "유리창", color: "#87CEFA", hex: 0x87CEFA, transparent: true, opacity: 0.6, symbol: "🪟←", type: "thin_window", rotY: Math.PI/2 };
        materials[501] = { name: "목제 문", color: "#F4A460", hex: 0xF4A460, symbol: "🚪↑", type: "thin_door", rotY: 0 };
        materials[502] = { name: "목제 문", color: "#F4A460", hex: 0xF4A460, symbol: "🚪→", type: "thin_door", rotY: Math.PI/2 };
        materials[503] = { name: "목제 문", color: "#F4A460", hex: 0xF4A460, symbol: "🚪↓", type: "thin_door", rotY: 0 };
        materials[504] = { name: "목제 문", color: "#F4A460", hex: 0xF4A460, symbol: "🚪←", type: "thin_door", rotY: Math.PI/2 };

        // 🚂 기찻길 데이터 (601 ~ 610, Color는 3D용으로만 유지) 🚂
        const trackHex = 0x607D8B; 
        
        // *2D용 color는 JS에서 빼고 CSS ID로 직접 디자인
        materials[601] = { name: "직선 선로", hex: trackHex, symbol: "═", type: "track_straight", rotY: Math.PI/2 };
        materials[602] = { name: "직선 선로", hex: trackHex, symbol: "║", type: "track_straight", rotY: 0 };
        materials[603] = { name: "코너 선로", hex: trackHex, symbol: "╚", type: "track_corner", rotY: 0 };
        materials[604] = { name: "코너 선로", hex: trackHex, symbol: "╔", type: "track_corner", rotY: -Math.PI/2 };
        materials[605] = { name: "코너 선로", hex: trackHex, symbol: "╗", type: "track_corner", rotY: Math.PI };
        materials[606] = { name: "코너 선로", hex: trackHex, symbol: "╝", type: "track_corner", rotY: Math.PI/2 };
        materials[607] = { name: "경사 선로", hex: trackHex, symbol: "🎢↑", type: "track_ramp", rotY: 0 };
        materials[608] = { name: "경사 선로", hex: trackHex, symbol: "🎢→", type: "track_ramp", rotY: -Math.PI/2 };
        materials[609] = { name: "경사 선로", hex: trackHex, symbol: "🎢↓", type: "track_ramp", rotY: Math.PI };
        materials[610] = { name: "경사 선로", hex: trackHex, symbol: "🎢←", type: "track_ramp", rotY: Math.PI/2 };

        // --- 5. 팔레트 UI ---
        const paletteDiv = document.getElementById('palette');
        let openingsContainer, colorPickerGroup, roofButtonsContainer, trackButtonsContainer;

        function initPalette() {
            paletteDiv.innerHTML = ''; 
            paletteDiv.appendChild(createSectionTitle("🧱 벽/바닥"));
            [0, 1, 2, 3, 8, 5, 6, 7].forEach(id => paletteDiv.appendChild(createPaletteBtn(id)));

            paletteDiv.appendChild(createSectionTitle("🪟 창호/문 (R)"));
            openingsContainer = document.createElement('div'); paletteDiv.appendChild(openingsContainer);

            // 기찻길 팔레트 추가
            paletteDiv.appendChild(createSectionTitle("🚂 기찻길 (R)"));
            trackButtonsContainer = document.createElement('div'); paletteDiv.appendChild(trackButtonsContainer);

            paletteDiv.appendChild(createSectionTitle("🏠 지붕 (R)"));
            colorPickerGroup = document.createElement('div'); colorPickerGroup.className = 'color-picker-group';
            paletteDiv.appendChild(colorPickerGroup);
            roofButtonsContainer = document.createElement('div'); paletteDiv.appendChild(roofButtonsContainer);

            renderColorPicker(); renderOpeningsButtons(); renderRoofButtons(); renderTrackButtons(); updateSelectionUI();
        }

        function renderColorPicker() {
            colorPickerGroup.innerHTML = `
                <div class="color-circle ${currentRoofColor === 'orange' ? 'active' : ''}" style="background:#FF9800" onclick="changeRoofColor('orange')"></div>
                <div class="color-circle ${currentRoofColor === 'blue' ? 'active' : ''}" style="background:#2196F3" onclick="changeRoofColor('blue')"></div>
                <div class="color-circle ${currentRoofColor === 'skyblue' ? 'active' : ''}" style="background:#87CEEB" onclick="changeRoofColor('skyblue')"></div>
            `;
        }

        function renderOpeningsButtons() {
            openingsContainer.innerHTML = '';
            openingsContainer.appendChild(createPaletteBtn(400 + currentWindowDir));
            openingsContainer.appendChild(createPaletteBtn(500 + currentDoorDir));
        }

        function renderRoofButtons() {
            roofButtonsContainer.innerHTML = '';
            const prefix = roofPrefix[currentRoofColor];
            roofButtonsContainer.appendChild(createPaletteBtn(prefix + currentSlopeDir));
            roofButtonsContainer.appendChild(createPaletteBtn(prefix + currentCornerDir));
        }

        // 기찻길 팔레트 버튼 (CSS ID 클래스 추가 필수)
        function renderTrackButtons() {
            trackButtonsContainer.innerHTML = '';
            trackButtonsContainer.appendChild(createPaletteBtn(600 + currentTrackStraightDir));
            trackButtonsContainer.appendChild(createPaletteBtn(600 + currentTrackCornerDir));
            trackButtonsContainer.appendChild(createPaletteBtn(600 + currentTrackRampDir));
        }

        function createSectionTitle(title) {
            const div = document.createElement('div'); div.className = 'mat-section-title'; div.innerText = title; return div;
        }

        function createPaletteBtn(id) {
            const btn = document.createElement('div'); btn.className = 'mat-btn'; btn.dataset.id = id; 
            const colorBox = document.createElement('div'); colorBox.className = 'color-box';
            
            // 🚂 [업데이트] 기찻길 ID(601~610)인 경우, JS 컬러 대신 CSS ID 클래스 직접 부여
            if(id >= 601 && id <= 610) {
                colorBox.classList.add(`mat-${id}`);
            } else {
                colorBox.style.backgroundColor = materials[id].color;
                if (id == 0) colorBox.style.border = '1px dashed #333';
            }

            if (materials[id].symbol) {
                colorBox.innerText = materials[id].symbol;
                // JS Font Color는 기찻길 디자인과 겹치므로 직선/경사/코너 레일에서는 CSS로 투명화 처리함 (mat-60x CSS 확인)
                if((id >= 200 && id < 300)) colorBox.style.color = "white"; 
            }
            
            btn.appendChild(colorBox);
            btn.appendChild(document.createTextNode(` ${materials[id].name}`));
            btn.onclick = () => { selectedMat = parseInt(id); updateSelectionUI(); };
            return btn;
        }

        function updateSelectionUI() {
            document.querySelectorAll('.mat-btn').forEach(btn => { btn.classList.toggle('active', parseInt(btn.dataset.id) === selectedMat); });
        }

        window.changeRoofColor = function(colorStr) {
            currentRoofColor = colorStr;
            if (materials[selectedMat] && materials[selectedMat].type.startsWith('roof')) {
                const dirOffset = selectedMat % 100; selectedMat = roofPrefix[colorStr] + dirOffset;
            } else { selectedMat = roofPrefix[colorStr] + currentSlopeDir; }
            renderColorPicker(); renderRoofButtons(); updateSelectionUI();
        };

        window.rotateCurrentMaterial = function() {
            if (!materials[selectedMat]) return;
            const type = materials[selectedMat].type;
            
            if (type === 'roof_slope') {
                currentSlopeDir = (currentSlopeDir % 4) + 1; selectedMat = roofPrefix[currentRoofColor] + currentSlopeDir;
            } else if (type === 'roof_corner') {
                currentCornerDir = ((currentCornerDir - 5 + 1) % 4) + 5; selectedMat = roofPrefix[currentRoofColor] + currentCornerDir;
            } else if (type === 'thin_window') {
                currentWindowDir = (currentWindowDir % 4) + 1; selectedMat = 400 + currentWindowDir;
            } else if (type === 'thin_door') {
                currentDoorDir = (currentDoorDir % 4) + 1; selectedMat = 500 + currentDoorDir;
            } else if (type === 'track_straight') {
                currentTrackStraightDir = (currentTrackStraightDir % 2) + 1; selectedMat = 600 + currentTrackStraightDir;
            } else if (type === 'track_corner') {
                currentTrackCornerDir = ((currentTrackCornerDir - 3 + 1) % 4) + 3; selectedMat = 600 + currentTrackCornerDir;
            } else if (type === 'track_ramp') {
                currentTrackRampDir = ((currentTrackRampDir - 7 + 1) % 4) + 7; selectedMat = 600 + currentTrackRampDir;
            } else {
                currentSlopeDir = (currentSlopeDir % 4) + 1; selectedMat = roofPrefix[currentRoofColor] + currentSlopeDir;
            }
            renderOpeningsButtons(); renderRoofButtons(); renderTrackButtons(); updateSelectionUI();
        };

        // --- 6. 그리드 캔버스 ---
        document.getElementById('btn-pen').onclick = (e) => setTool('pen', e.target);
        document.getElementById('btn-rect').onclick = (e) => setTool('rect', e.target);
        function setTool(tool, target) { currentTool = tool; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); target.classList.add('active'); }

        const gridDiv = document.getElementById('grid');

        window.addEventListener('mouseup', () => {
            if (isMouseDown) {
                if (currentTool === 'rect' && rectStartX !== -1) {
                    let minX = Math.min(rectStartX, rectEndX), maxX = Math.max(rectStartX, rectEndX);
                    let minY = Math.min(rectStartY, rectEndY), maxY = Math.max(rectStartY, rectEndY);
                    let fillMat = (buildingData[currentLayer][rectStartY][rectStartX] === selectedMat && selectedMat !== 0) ? 0 : selectedMat;
                    for (let y = minY; y <= maxY; y++) for (let x = minX; x <= maxX; x++) buildingData[currentLayer][y][x] = fillMat;
                    update3DSafe(); stateChanged = true;
                }
                if (stateChanged) { saveHistory(); stateChanged = false; }
            }
            isMouseDown = false; rectStartX = -1; drawGrid();
        });

        function drawGrid() {
            gridDiv.style.gridTemplateColumns = `repeat(${SIZE}, 24px)`; gridDiv.style.gridTemplateRows = `repeat(${SIZE}, 24px)`; gridDiv.innerHTML = '';
            let rMinX = Math.min(rectStartX, rectEndX), rMaxX = Math.max(rectStartX, rectEndX), rMinY = Math.min(rectStartY, rectEndY), rMaxY = Math.max(rectStartY, rectEndY);

            for (let y = 0; y < SIZE; y++) {
                for (let x = 0; x < SIZE; x++) {
                    const cell = document.createElement('div'); cell.className = 'cell';
                    if ((x + 1) % 5 === 0 && x !== SIZE - 1) cell.classList.add('col-5'); if ((y + 1) % 5 === 0 && y !== SIZE - 1) cell.classList.add('row-5');

                    const matId = buildingData[currentLayer][y][x];
                    if (matId !== 0) {
                        // 🚂 [업데이트] 기찻길 ID인 경우 CSS ID 클래스 직접 부여 (비주얼 디자인)
                        if (matId >= 601 && matId <= 610) {
                            cell.classList.add(`mat-${matId}`);
                        } else {
                            cell.style.backgroundColor = materials[matId].color;
                        }

                        if (materials[matId].symbol) {
                            cell.innerText = materials[matId].symbol; cell.style.fontSize = "12px"; // 직선레일은 12px가 예쁨
                            // 지붕 파란색 계열만 흰색 글씨, 기찻길은 CSS에서 투명화됨
                            if((matId >= 200 && matId < 300)) cell.style.color = "white"; 
                        }
                    }

                    if (showOnionSkin && currentLayer > 0 && buildingData[currentLayer - 1][y][x] !== 0) {
                        const onionMatId = buildingData[currentLayer - 1][y][x];
                        const onion = document.createElement('div'); onion.className = 'onion-skin'; 
                        // 어니언 스킨도 기찻길은 전용 자갈 패턴으로 표시하면 헷갈림, 그냥 연한 회색으로 처리
                        if (onionMatId >= 601 && onionMatId <= 610) onion.style.backgroundColor = "#ccc";
                        else onion.style.backgroundColor = materials[onionMatId].color; 
                        cell.appendChild(onion);
                    }

                    if (currentTool === 'rect' && isMouseDown && rectStartX !== -1) {
                        if (x >= rMinX && x >= rMinY && x <= rMaxX && y <= rMaxY) cell.classList.add('preview-rect');
                    }

                    cell.onmouseenter = () => {
                        if (!isMouseDown) { 
                            // 미리보기 힌트
                            if (materials[selectedMat] && materials[selectedMat].symbol) cell.setAttribute('data-preview', materials[selectedMat].symbol);
                        } else {
                            if (currentTool === 'pen') { buildingData[currentLayer][y][x] = (paintMode === 'erase') ? 0 : selectedMat; stateChanged = true; drawGrid(); update3DSafe(); } else { rectEndX = x; rectEndY = y; drawGrid(); }
                        }
                    };
                    cell.onmouseleave = () => { cell.removeAttribute('data-preview'); };
                    cell.onmousedown = () => {
                        isMouseDown = true;
                        if (currentTool === 'pen') { paintMode = (matId === selectedMat && selectedMat !== 0) ? 'erase' : 'paint'; buildingData[currentLayer][y][x] = (paintMode === 'erase') ? 0 : selectedMat; stateChanged = true; drawGrid(); update3DSafe(); } else { rectStartX = x; rectStartY = y; rectEndX = x; rectEndY = y; drawGrid(); }
                    };
                    gridDiv.appendChild(cell);
                }
            }
            document.getElementById('layer-text').innerText = `${currentLayer + 1} 단`; document.getElementById('btn-down').disabled = currentLayer === 0; document.getElementById('btn-up').disabled = currentLayer === LAYERS - 1;
        }

        document.getElementById('btn-up').onclick = () => { if (currentLayer < LAYERS - 1) { currentLayer++; drawGrid(); } };
        document.getElementById('btn-down').onclick = () => { if (currentLayer > 0) { currentLayer--; drawGrid(); } };
        document.getElementById('btn-onion').onclick = (e) => { showOnionSkin = !showOnionSkin; e.target.innerText = showOnionSkin ? "비치기 ON" : "비치기 OFF"; e.target.style.background = showOnionSkin ? "#2196F3" : "#999"; drawGrid(); };

        // --- 7. 3D 프리뷰 ---
        let scene, camera, renderer, controls, buildingGroup;
        let cubeGeometry, thinBoxGeometry, wedgeGeometry, cornerGeom;
        let trackStraightGeom, trackBox1Geom, trackBox2Geom, trackRampGeom; 
        let edgeMaterial, cubeEdges, slopeEdges, cornerEdges, thinEdges;
        let trackStraightEdges, trackBox1Edges, trackBox2Edges, trackRampEdges;
        let is3DReady = false;

        function init3D() {
            const container3d = document.getElementById('canvas3d');
            if (typeof THREE === 'undefined') { container3d.innerHTML = "<div style='color:red; text-align:center;'><b>3D 엔진 로딩 실패</b></div>"; return; }
            container3d.innerHTML = ''; is3DReady = true;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container3d.clientWidth / container3d.clientHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setSize(container3d.clientWidth, container3d.clientHeight); container3d.appendChild(renderer.domElement);

            camera.position.set(SIZE * 1.2, Math.max(SIZE * 0.8, 15), SIZE * 1.2);
            controls = new THREE.OrbitControls(camera, renderer.domElement); controls.target.set(SIZE / 2, 0, SIZE / 2); controls.update();
            scene.add(new THREE.AmbientLight(0xffffff, 0.6)); const dirLight = new THREE.DirectionalLight(0xffffff, 0.6); dirLight.position.set(10, 20, 10); scene.add(dirLight);

            buildingGroup = new THREE.Group(); scene.add(buildingGroup);

            cubeGeometry = new THREE.BoxGeometry(1, 1, 1); thinBoxGeometry = new THREE.BoxGeometry(1, 1, 0.1); triangleShape = new THREE.Shape(); triangleShape.moveTo(-0.5, -0.5); triangleShape.lineTo(0.5, -0.5); triangleShape.lineTo(-0.5, 0.5); triangleShape.lineTo(-0.5, -0.5); wedgeGeometry = new THREE.ExtrudeGeometry(triangleShape, { depth: 1, bevelEnabled: false }); wedgeGeometry.translate(0, 0, -0.5); cornerGeom = new THREE.ConeGeometry(Math.sqrt(2)/2, 1, 4); cornerGeom.rotateY(Math.PI / 4);

            // 기찻길 3D 지오메트리
            trackStraightGeom = new THREE.BoxGeometry(0.6, 0.1, 1);
            trackBox1Geom = new THREE.BoxGeometry(0.6, 0.1, 0.8); trackBox1Geom.translate(0, 0, -0.1); 
            trackBox2Geom = new THREE.BoxGeometry(0.8, 0.1, 0.6); trackBox2Geom.translate(0.1, 0, 0);  
            trackRampGeom = new THREE.BoxGeometry(0.6, 0.1, 1.414); wedgeGeomRamp = new THREE.BoxGeometry(1, 1, 1); // 지우기

            edgeMaterial = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 1 });
            cubeEdges = new THREE.EdgesGeometry(cubeGeometry); slopeEdges = new THREE.EdgesGeometry(wedgeGeometry); cornerEdges = new THREE.EdgesGeometry(cornerGeom); thinEdges = new THREE.EdgesGeometry(thinBoxGeometry); trackStraightEdges = new THREE.EdgesGeometry(trackStraightGeom); trackBox1Edges = new THREE.EdgesGeometry(trackBox1Geom); trackBox2Edges = new THREE.EdgesGeometry(trackBox2Geom); trackRampEdges = new THREE.EdgesGeometry(trackRampGeom);

            update3DSafe(); animate();
        }

        function update3DSafe() {
            if (!is3DReady) return; 
            scene.remove(buildingGroup); buildingGroup = new THREE.Group();

            for (let l = 0; l < LAYERS; l++) {
                for (let y = 0; y < SIZE; y++) {
                    for (let x = 0; x < SIZE; x++) {
                        const matId = buildingData[l][y][x]; if (matId === 0) continue;
                        const matInfo = materials[matId];
                        const material = new THREE.MeshLambertMaterial({ color: matInfo.hex, transparent: matInfo.transparent || false, opacity: matInfo.opacity || 1.0, side: THREE.DoubleSide });

                        // 기찻길 렌더링
                        if (matId >= 601 && matId <= 602) { // 직선
                            const mesh = new THREE.Mesh(trackStraightGeom, material);
                            mesh.position.set(x + 0.5, l + 0.05, y + 0.5); mesh.rotation.y = matInfo.rotY;
                            mesh.add(new THREE.LineSegments(trackStraightEdges, edgeMaterial));
                            buildingGroup.add(mesh); continue;
                        } else if (matId >= 603 && matId <= 606) { // 코너
                            const mesh = new THREE.Group();
                            const m1 = new THREE.Mesh(trackBox1Geom, material); m1.add(new THREE.LineSegments(trackBox1Edges, edgeMaterial));
                            const m2 = new THREE.Mesh(trackBox2Geom, material); m2.add(new THREE.LineSegments(trackBox2Edges, edgeMaterial));
                            mesh.add(m1); mesh.add(m2); mesh.position.set(x + 0.5, l + 0.05, y + 0.5); mesh.rotation.y = matInfo.rotY;
                            buildingGroup.add(mesh); continue;
                        } else if (matId >= 607 && matId <= 610) { // 경사
                            const mesh = new THREE.Mesh(trackRampGeom, material);
                            mesh.position.set(x + 0.5, l + 0.5, y + 0.5); 
                            mesh.rotation.x = Math.PI / 4; mesh.rotation.y = matInfo.rotY;
                            mesh.add(new THREE.LineSegments(trackRampEdges, edgeMaterial));
                            buildingGroup.add(mesh); continue;
                        }
                        
                        // 기본 블록
                        let mesh, edgesGeo;
                        if (matInfo.type === 'roof_slope') { mesh = new THREE.Mesh(wedgeGeometry, material); edgesGeo = slopeEdges; } 
                        else if (matInfo.type === 'roof_corner') { mesh = new THREE.Mesh(cornerGeom, material); edgesGeo = cornerEdges; } 
                        else if (matInfo.type === 'thin_window' || matInfo.type === 'thin_door') { mesh = new THREE.Mesh(thinBoxGeometry, material); edgesGeo = thinEdges; } 
                        else { mesh = new THREE.Mesh(cubeGeometry, material); edgesGeo = cubeEdges; }
                        
                        mesh.position.set(x + 0.5, l + 0.5, y + 0.5); if (matInfo.rotY !== undefined) mesh.rotation.y = matInfo.rotY;
                        mesh.add(new THREE.LineSegments(edgesGeo, edgeMaterial)); buildingGroup.add(mesh);
                    }
                }
            }
            scene.add(buildingGroup);
        }

        function animate() { if(!is3DReady) return; requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        window.capture3D = function() {
            if (!is3DReady) return; renderer.render(scene, camera); const dataURL = renderer.domElement.toDataURL("image/png");
            let fileName = prompt("이미지 이름을 입력하세요:", "pokopia_3d_preview");
            if (fileName === null) return; fileName = fileName.trim() || "pokopia_3d_preview";
            if (!fileName.endsWith('.png')) fileName += '.png';
            const a = document.createElement('a'); a.href = dataURL; a.download = fileName; a.click();
        };

        window.addEventListener('resize', () => { if(!is3DReady) return; const container3d = document.getElementById('canvas3d'); camera.aspect = container3d.clientWidth / container3d.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(container3d.clientWidth, container3d.clientHeight); });
        try { initPalette(); saveHistory(); drawGrid(); init3D(); } catch (error) { console.error(error); }
    </script>
</body>
